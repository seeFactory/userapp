<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" type="image/png" href="/static/logo.png" />
    <link rel="apple-touch-icon" href="/static/logo.png" />
    <script data-seefactory-tma-launch>
      (function () {
        var key = 'seeFactoryTgLaunchParams'
        var target = window.location.hash || window.location.search || ''
        if (!/(^|[#?&])tgWebApp(Data|Version|Platform|ThemeParams)=/.test(target)) return
        var value = target.charAt(0) === '#' || target.charAt(0) === '?' ? target.slice(1) : target
        window.__SEEFACTORY_TG_LAUNCH_PARAMS__ = value
        try {
          window.sessionStorage.setItem(key, value)
        } catch (error) {}
        if (window.location.hash && window.location.hash.indexOf('#/') !== 0) {
          window.history.replaceState(null, '', window.location.pathname + window.location.search + '#/pages/index/index?tgLaunch=' + encodeURIComponent(value))
        }
      })()
    </script>
    <title>seeFactory</title>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
