<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>正在返回 seeFactory</title>
</head>
<body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#05070d;color:#f7fbff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <p>正在返回 seeFactory...</p>
  <script>
    (function () {
      var fallbackReturnTo = "seefactory://auth/telegram/callback";
      var params = new URLSearchParams(location.search);
      var returnTo = params.get("returnTo") || fallbackReturnTo;

      try {
        var parsed = new URL(returnTo);
        if (parsed.protocol !== "seefactory:" || parsed.hostname !== "auth" || parsed.pathname !== "/telegram/callback") {
          returnTo = fallbackReturnTo;
        }
      } catch (error) {
        returnTo = fallbackReturnTo;
      }

      var target = new URL(returnTo);
      ["id", "first_name", "last_name", "username", "photo_url", "auth_date", "hash"].forEach(function (key) {
        var value = params.get(key);
        if (value) target.searchParams.set(key, value);
      });
      location.replace(target.toString());
    })();
  </script>
</body>
</html>
