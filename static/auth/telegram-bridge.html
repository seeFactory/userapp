<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>seeFactory Telegram 登录</title>
  <style>
    :root {
      color-scheme: dark;
      background: #05070d;
      color: #f7fbff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(42, 192, 218, .28), transparent 42%),
        linear-gradient(180deg, #07131d 0%, #05070d 64%);
    }

    main {
      width: min(88vw, 360px);
      padding: 28px 22px;
      border: 1px solid rgba(128, 231, 255, .26);
      border-radius: 22px;
      background: rgba(8, 13, 24, .78);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .38);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: rgba(247, 251, 255, .72);
      line-height: 1.6;
      font-size: 14px;
    }

    .status {
      margin-top: 18px;
      color: rgba(247, 251, 255, .54);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>seeFactory</h1>
    <p>请使用 Telegram 完成账户授权，授权成功后将自动返回应用。</p>
    <div id="telegram-login"></div>
    <div class="status" id="status">正在准备 Telegram 授权...</div>
  </main>
  <script>
    (function () {
      var fallbackReturnTo = "seefactory://auth/telegram/callback";
      var params = new URLSearchParams(location.search);
      var returnTo = params.get("returnTo") || fallbackReturnTo;

      try {
        var parsed = new URL(returnTo);
        if (parsed.protocol !== "seefactory:" || parsed.hostname !== "auth" || parsed.pathname !== "/telegram/callback") {
          returnTo = fallbackReturnTo;
        }
      } catch (error) {
        returnTo = fallbackReturnTo;
      }

      var authUrl = new URL("/auth/telegram-callback.html", location.origin);
      authUrl.searchParams.set("returnTo", returnTo);

      var script = document.createElement("script");
      script.async = true;
      script.src = "https://telegram.org/js/telegram-widget.js?22";
      script.setAttribute("data-telegram-login", "seefactory_bot");
      script.setAttribute("data-size", "large");
      script.setAttribute("data-userpic", "true");
      script.setAttribute("data-request-access", "write");
      script.setAttribute("data-auth-url", authUrl.toString());
      script.onload = function () {
        document.getElementById("status").textContent = "请选择 Telegram 账户继续。";
      };
      script.onerror = function () {
        document.getElementById("status").textContent = "Telegram 授权组件加载失败，请检查网络后重试。";
      };

      document.getElementById("telegram-login").appendChild(script);
    })();
  </script>
</body>
</html>
